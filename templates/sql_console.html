{% extends "base.html" %}

{% block content %}

<h2>SQL Console</h2>

<form method="post">

<textarea name="query" rows="6" style="width:100%"></textarea>

<button type="submit">Run Query</button>

</form>

{% if result %}

<table>

<tr>
{% for c in columns %}
<th>{{c}}</th>
{% endfor %}
</tr>

{% for r in result %}

<tr>

{% for v in r %}
<td>{{v}}</td>
{% endfor %}

</tr>

{% endfor %}

</table>

{% endif %}

{% endblock %}
